<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/navbar.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
	<title>Actualizar estado de la cuenta de usuario</title>
</head>

<body class="auth-page">
	<nav class="navbar" id="navbar">
		<div class="icon-hamburger" id="hamburger">
			<span class="bar"></span>
			<span class="bar"></span>
			<span class="bar"></span>
		</div>
		<div class="menu-wrapper">
			<ul class="menu menu-izq" id="menu-izq">
				<li class="menu-item"><a class="menu-link" th:href="@{/}">Inicio</a></li>
				<li class="menu-item" sec:authorize="isAuthenticated()">
					<a sec:authorize="hasRole('ASISTENTES')" class="menu-link"
						th:href="@{/profile/asistente/dashboardAsistente}">Perfil</a>
					<a sec:authorize="hasRole('ORGANIZADORES')" class="menu-link"
						th:href="@{/profile/organizador/dashboardOrganizador}">Perfil</a>
					<a sec:authorize="hasRole('ADMINISTRADORES')" class="menu-link"
						th:href="@{/profile/administrador/dashboardAdministrador}">Perfil</a>
				</li>
				<li class="menu-item" sec:authorize="!isAuthenticated()">
					<a class="menu-link" th:href="@{/#eventos}">Eventos</a>
				</li>
				<li sec:authorize="isAuthenticated() and hasRole('ADMINISTRADORES')" class="menu-item dropdown">
					<a class="menu-link dropdown-toggle">Gestionar</a>
					<ul class="dropdown-menu" id="menu-izq">
						<li class="menu-item">
							<a href="/profile/administrador/eventos/tablaEventos" class="dropdown-link">Eventos</a>
						</li>
						<li class="menu-item">
							<a href="/profile/administrador/usuarios/tablaUsuarios" class="dropdown-link">Usuarios</a>
						</li>
						<li class="menu-item">
							<a href="/profile/administrador/categorias/tablaCategorias"
								class="dropdown-link">Categorias</a>
						</li>
					</ul>
				</li>
			</ul>
			<ul sec:authorize="!isAuthenticated()" class="menu menu-der user-dropdown" id="menu-der">
				<li class="menu-item">
					<a class="menu-link" th:href="@{/auth/login}">Inicia sesion</a>
				</li>
				<li class="menu-item">
					<a class="menu-link" th:href="@{/auth/registrarse}">Registrarse</a>
				</li>
			</ul>
			<ul sec:authorize="isAuthenticated()" class="menu menu-der user-dropdown" id="menu-der">

				<li class="menu-item">
					<form th:action="@{/logout}" method="post" id="form-salir">
						<button class="menu-link btn-logout" id="salir" type="submit">
							Cerrar sesion
						</button>
					</form>
				</li>
			</ul>
		</div>
		<div class="user-container">
			<svg class="icon-user" id="icon-user" viewBox="0 0 24 24">
				<circle cx="12" cy="8" r="4" />
				<path d="M4 20c0-4 4-6 8-6s8 2 8 6" />
			</svg>
		</div>
	</nav>
	<div class="container">
		<main class="content">
			<section class="auth" id="auth">
				<div class="auth-card">
					<header class="auth-header" id="login-header">
						<h1 class="auth-h">Formulario de actualización de usuario</h1>
					</header>
					<form th:action="@{/profile/administrador/usuarios/form_usuarios}" th:object="${usuario}"
						class="auth-form" id="actualizar-usuario-form" method="post">

						<input type="hidden" th:field="*{idUsuario}">

						<fieldset class="campos">

							<label for="mail">
								<input type="email" th:field="*{mail}" class="campo" id="mail"
									placeholder="mail@gmail.com" disabled>
							</label>

							<label for="EstadoCuenta">Estado de la cuenta
								<select th:field="*{estadoCuenta}" th:class="campo" style="margin-left: 10px;">
									<option value="" disabled th:selected="*{estadoCuenta} == null">--- Estado de la
										cuenta ---</option>
									<option th:each="estadoSelect : ${estadosCuenta}" th:value="${estadoSelect}"
										th:text="${estadoSelect}">
									</option>
								</select>
							</label>

						</fieldset>

						<fieldset class="controles">
							<input type="submit" class="enviar" value="Actualizar estado del usuario">
						</fieldset>

					</form>
					<div class="mensaje-container">
						<span th:if="${errorMsg}" th:text="${errorMsg}" class="msgErrServ"></span>
						<span th:if="${successMsg}" th:text="${successMsg}" class="mensajeExito"></span>
					</div>
				</div>
			</section>
		</main>
	</div>
</body>

</html>
